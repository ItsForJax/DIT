services:

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: dit_db
      MYSQL_USER: dit_user
      MYSQL_PASSWORD: dit_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=rootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - dit_network

  web:
    build: .
    restart: unless-stopped
    environment:
      SECRET_KEY: change-this-secret-key-in-production
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: dit_db
      DB_USER: dit_user
      DB_PASSWORD: dit_password
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dit_network

volumes:
  mysql_data:

networks:
  dit_network:
    driver: bridge
